name: phpstan

on:
  push:
    branches: [main]
    paths:
      - '**.php'
      - 'phpstan.neon'
      - '.github/workflows/phpstan.yml'
  pull_request:
    paths:
      - '**.php'
      - 'phpstan.neon'
      - '.github/workflows/phpstan.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpstan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout statamic-telemetry
        uses: actions/checkout@v6
        with:
          path: statamic-telemetry

      # Private sibling repo — needs CBOX_REPO_TOKEN (PAT with read access
      # to cboxdk/laravel-telemetry); see run-tests.yml.
      - name: Checkout laravel-telemetry
        uses: actions/checkout@v6
        with:
          repository: cboxdk/laravel-telemetry
          path: laravel-telemetry
          token: ${{ secrets.CBOX_REPO_TOKEN || github.token }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, intl, iconv, fileinfo, exif, gd
          coverage: none

      - name: Install dependencies
        working-directory: statamic-telemetry
        run: composer update --prefer-stable --prefer-dist --no-interaction

      - name: Run PHPStan
        working-directory: statamic-telemetry
        run: vendor/bin/phpstan analyse --memory-limit=1G --error-format=github
